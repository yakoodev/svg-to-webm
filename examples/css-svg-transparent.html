<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <style>
    html, body { margin: 0; background: transparent; overflow: hidden; }
    svg { width: 800px; height: 240px; display: block; }
    .word {
      font: 800 58px Arial, Helvetica, sans-serif;
      transform-origin: 400px 120px;
      animation: bob 2.4s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-10px) scale(1.08); }
    }
  </style>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
    <defs>
      <linearGradient id="g" x1="0%" x2="100%">
        <stop offset="0%" stop-color="#7c3aed" />
        <stop offset="100%" stop-color="#06b6d4" />
      </linearGradient>
    </defs>
    <text class="word" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle" fill="url(#g)">CSS SVG</text>
  </svg>
</body>
</html>
